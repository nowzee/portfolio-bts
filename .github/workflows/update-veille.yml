name: Mise à jour de la veille

on:
  schedule:
    # Toutes les 6 heures (minute 17 pour éviter les pics)
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-veille
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch RSS feeds
        run: python scripts/fetch_rss.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain assets/data/news.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/data/news.json
            git commit -m "chore(veille): mise à jour automatique du flux RSS"
            git push
          else
            echo "Pas de changement, rien à commit."
          fi
